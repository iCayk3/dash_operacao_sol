services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-sol-provedor
    restart: unless-stopped
    ports:
      - "6000:6000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 6000
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:6000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
