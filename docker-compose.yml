services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-sol-provedor
    restart: unless-stopped
    ports:
      - "6080:6000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 6000
      ROUTERBOX_URL: ${ROUTERBOX_URL:-https://sistema.solprovedor.com.br/routerbox/ws/rbx_server_json.php}
      ROUTERBOX_INTEGRATION_KEY: ${ROUTERBOX_INTEGRATION_KEY}
      ROUTERBOX_STATUS_ACTIVE: ${ROUTERBOX_STATUS_ACTIVE:-A}
      ROUTERBOX_STATUS_INACTIVE: ${ROUTERBOX_STATUS_INACTIVE:-I,N}
      ROUTERBOX_STATUS_CANCELED: ${ROUTERBOX_STATUS_CANCELED:-C}
      ROUTERBOX_STATUS_SUSPENDED: ${ROUTERBOX_STATUS_SUSPENDED:-S}
      ROUTERBOX_STATUS_BLOCKED: ${ROUTERBOX_STATUS_BLOCKED:-B}
      ROUTERBOX_STATUS_AWAITING_INSTALLATION: ${ROUTERBOX_STATUS_AWAITING_INSTALLATION:-E}
      ROUTERBOX_CACHE_TTL_MS: ${ROUTERBOX_CACHE_TTL_MS:-300000}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:6000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
